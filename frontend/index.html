<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BolChaal — Maithili Translator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

    <!-- Animated ambient blobs -->
    <div class="bg-blobs" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">

        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="16" cy="16" r="16" fill="url(#logoGrad)"/>
                    <path d="M8 22c0-4.418 3.582-8 8-8s8 3.582 8 8" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
                    <circle cx="16" cy="11" r="3" fill="white"/>
                    <defs>
                        <linearGradient id="logoGrad" x1="0" y1="0" x2="32" y2="32">
                            <stop offset="0%" stop-color="#7c6ff7"/>
                            <stop offset="100%" stop-color="#22d3ee"/>
                        </linearGradient>
                    </defs>
                </svg>
                <span class="logo-text">BolChaal</span>
            </div>

            <div class="status-pill">
                <span id="status-dot" class="status-dot loading"></span>
                <span id="status-text" class="status-text">Connecting...</span>
            </div>
        </header>

        <!-- Tagline -->
        <div class="tagline">
            <h1>Translate anything to <span class="gradient-text">Maithili</span></h1>
            <p>Powered by AI4Bharat IndicTrans2 &middot; Runs fully offline</p>
        </div>

        <!-- Translator Card -->
        <main class="translator-card" id="translator">

            <!-- Source Panel -->
            <section class="panel panel-source">
                <div class="panel-header">
                    <select id="src-lang-select" class="lang-select" aria-label="Source language">
                        <option value="">Loading...</option>
                    </select>
                    <span id="hinglish-badge" class="hinglish-badge hidden">Auto-detect</span>
                </div>

                <div class="panel-body">
                    <textarea
                        id="source-text"
                        class="text-area"
                        placeholder="Type or paste your text here..."
                        maxlength="1000"
                        spellcheck="false"
                        aria-label="Source text"
                    ></textarea>
                </div>

                <div class="panel-footer">
                    <span id="char-count" class="char-count">0 / 1000</span>
                    <button id="clear-btn" class="icon-btn" title="Clear text" aria-label="Clear input">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                            <path d="M18 6L6 18M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
            </section>

            <!-- Center Divider with Translate Button -->
            <div class="divider" role="separator">
                <button
                    id="translate-btn"
                    class="translate-btn"
                    title="Translate (Ctrl + Enter)"
                    aria-label="Translate"
                >
                    <!-- Arrow icon -->
                    <span class="btn-idle">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                    </span>
                    <!-- Spinner -->
                    <span class="btn-loading hidden" aria-hidden="true">
                        <svg class="spinner" width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="9" stroke="rgba(255,255,255,0.3)" stroke-width="2.5"/>
                            <path d="M12 3a9 9 0 019 9" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                    </span>
                </button>
            </div>

            <!-- Target Panel -->
            <section class="panel panel-target">
                <div class="panel-header">
                    <div class="target-lang-label">
                        <span class="lang-name">Maithili</span>
                        <span class="lang-script">Devanagari</span>
                    </div>
                    <button id="copy-btn" class="icon-btn" title="Copy translation" aria-label="Copy translation">
                        <svg id="copy-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2"/>
                            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
                        </svg>
                    </button>
                </div>

                <div class="panel-body">
                    <div
                        id="output-text"
                        class="text-output"
                        aria-live="polite"
                        aria-label="Maithili translation"
                    >
                        <span class="placeholder-text">Translation will appear here...</span>
                    </div>
                </div>

                <div class="panel-footer">
                    <span id="detected-lang" class="tag hidden"></span>
                    <span id="time-taken" class="time-taken hidden"></span>
                </div>
            </section>

        </main>

        <!-- Error Banner -->
        <div id="error-banner" class="error-banner hidden" role="alert">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" flex-shrink="0">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span id="error-text">Something went wrong.</span>
        </div>

        <!-- History -->
        <section id="history-section" class="history-section hidden">
            <div class="history-header">
                <div class="history-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    <span>History</span>
                    <span id="history-count" class="history-count">0</span>
                </div>
                <button id="clear-history-btn" class="ghost-btn">Clear all</button>
            </div>
            <div id="history-list" class="history-list"></div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>BolChaal &middot; IndicTrans2 by AI4Bharat &middot; Fully local &amp; private</p>
        </footer>

    </div>

    <script src="scripts/app.js"></script>
</body>
</html>
